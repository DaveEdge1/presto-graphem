# Conda environment for the demo reconstruction pipeline.
#
# DEMO DEPS — the placeholder algorithm in scripts/reconstruct.py only
# needs the four core scientific-Python libraries plus LiPD for the
# pickle-reading adapter. When you swap in your real reconstruction,
# add its dependencies here.
#
# Tips:
# - Pin major versions of your scientific deps for reproducibility.
# - Prefer conda-forge over pip for packages that have C / Fortran
#   extensions (avoids brittle wheels on linux-amd64 CI runners).
# - Keep this file SHORT — every dep adds ~5–60 s to the cold-build
#   time of the Docker image. CI caches the conda-env layer, so the
#   cold build only re-runs when environment.yml changes.

name: presto-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - pandas
  - xarray
  - netcdf4
  - matplotlib-base
  - pyyaml
  - pip
  - pip:
    # LiPD (the lowercase pip package) is the original LiPD-utilities
    # library — used by the adapter to read lipdverse legacy pickles.
    # NOT pylipd (which is the newer RDF-based library; it does not
    # consume the legacy {'D': {...}} pickle format).
    - LiPD
