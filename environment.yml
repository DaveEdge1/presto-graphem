# Conda environment for the GraphEM (cfr) reconstruction pipeline.
#
# This file provides ONLY the compiled scientific stack (numpy / scipy /
# netcdf4 / cartopy) plus the Cython/numpy toolchain that cfr-graphem needs
# to build. cfr / cfr-graphem / blosc2 / LiPD are pip-installed in a
# dedicated Dockerfile layer because cfr-graphem's setup.py imports Cython
# at build time, which pip's PEP 517 build isolation would otherwise hide
# (it must build with --no-build-isolation against this env's Cython/numpy).
#
# Versions are pinned to the combination verified with LMR2
# (cfr 2025.7.28 + cfr-graphem 0.5.0) so the GraphEM API used by
# scripts/reconstruct.py (ReconJob.run_graphem_cfg, which requires
# sp_FF / sp_FP / sp_PP) matches.

name: presto-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy=1.26.4
  - pandas=2.1.4
  - scipy=1.13.1
  - xarray=2023.7.0
  - netcdf4=1.7.2
  - matplotlib-base=3.9.2
  - cartopy=0.22.0
  - scikit-learn=1.5.2
  - statsmodels=0.14.2
  # Build toolchain for cfr-graphem's Cython extension (used with
  # --no-build-isolation in the Dockerfile).
  - cython=3.0.11
  - setuptools
  - wheel
  - pyyaml
  - pip
